# Minimal source -> scope -> offline FFT closure plan.
# Assumes DG4202 CH2 is connected to RTM2032 CH1.
# The plan restores DG4202 CH2 state after capture. FFT validation is done with:
#   python -m wavebench capture inspect <capture_dir> --fft --fft-expect-frequency 1000 --harmonics 7

[experiment]
name = "closure_sine_1k_fft"
label = "closure_sine_1k_fft"

[restore]
source_state = true
source_channel = 2

[[steps]]
kind = "source.status"
channel = 2

[[steps]]
kind = "source.set_func"
channel = 2
function = "sin"

[[steps]]
kind = "source.set_vpp"
channel = 2
value_vpp = 1.0

[[steps]]
kind = "source.set_freq"
channel = 2
frequency_hz = 1000

[[steps]]
kind = "source.output"
channel = 2
state = "on"

[[steps]]
kind = "sleep"
duration_s = 0.2

[[steps]]
kind = "scope.capture"
channel = 1
label = "closure_sine_1k"
points = "def"
window_frequency_hz = 1000
target_cycles = 10
expect_frequency_hz = 1000
frequency_tolerance = 0.05
save_csv = false
save_npy = true
